services:
  postgres:
    image: postgres:16-alpine
    container_name: ar-saude-postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=64MB -c work_mem=4MB
    environment:
      POSTGRES_USER: ${DB_USER:-arsaude}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arsaude}
      POSTGRES_DB: ${DB_NAME:-arsaude_alertas}
    ports:
      - '127.0.0.1:${DB_HOST_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-arsaude} -d ${DB_NAME:-arsaude_alertas}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  coletor:
    image: ghcr.io/andrevictor20/ar-saude-coletor:latest
    security_opt:
      - no-new-privileges:true
    build:
      context: ./coletor
    container_name: ar-saude-coletor
    restart: unless-stopped
    environment:
      PORT: 3000
      OPEN_METEO_BASE_URL: ${OPEN_METEO_BASE_URL:-https://air-quality-api.open-meteo.com/v1/air-quality}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-313e9589d80e64758e636be87b5ab8dc}
      OPENWEATHER_BASE_URL: ${OPENWEATHER_BASE_URL:-http://api.openweathermap.org/data/2.5/air_pollution}
      INTERSCITY_CATALOG_URL: ${INTERSCITY_CATALOG_URL:-https://interscity.rasppi.cloud/catalog}
      INTERSCITY_ADAPTOR_URL: ${INTERSCITY_ADAPTOR_URL:-https://interscity.rasppi.cloud/adaptor}
      INTERSCITY_COLLECTOR_URL: ${INTERSCITY_COLLECTOR_URL:-https://interscity.rasppi.cloud/collector}
      KONG_UPSTREAM_URL: ${KONG_UPSTREAM_URL:-https://kong.rasppi.cloud/upstreams}
      CRON_COLLECT_INTERVAL: ${CRON_COLLECT_INTERVAL:-*/30 * * * *}
      MAX_RETRIES: ${MAX_RETRIES:-5}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-1000}
    ports:
      - '${COLETOR_PORT:-3000}:3000'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  motor-alertas:
    image: ghcr.io/andrevictor20/ar-saude-motor-alertas:latest
    security_opt:
      - no-new-privileges:true
    build:
      context: ./motor-alertas
    container_name: ar-saude-motor-alertas
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-arsaude}
      DB_PASSWORD: ${DB_PASSWORD:-arsaude}
      DB_NAME: ${DB_NAME:-arsaude_alertas}
      INTERSCITY_CATALOG_URL: ${INTERSCITY_CATALOG_URL:-https://interscity.rasppi.cloud/catalog}
      INTERSCITY_COLLECTOR_URL: ${INTERSCITY_COLLECTOR_URL:-https://interscity.rasppi.cloud/collector}
      CATALOG_PAGE_SIZE: ${CATALOG_PAGE_SIZE:-500}
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-*/1 * * * *}
      ALERT_AQI_THRESHOLD: ${ALERT_AQI_THRESHOLD:-61}
      MAX_RETRIES: ${MAX_RETRIES:-5}
      RETRY_BASE_DELAY_MS: ${RETRY_BASE_DELAY_MS:-1000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${FRONTEND_PORT:-3002},https://arsaude.rasppi.cloud}
    ports:
      - '${MOTOR_PORT:-3001}:3001'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  frontend:
    image: ghcr.io/andrevictor20/ar-saude-frontend:latest
    security_opt:
      - no-new-privileges:true
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${MOTOR_PORT:-3001}}
    container_name: ar-saude-frontend
    restart: unless-stopped
    depends_on:
      - motor-alertas
    ports:
      - '${FRONTEND_PORT:-3002}:3002'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Observabilidade ─────────────────────────────────────────────────────
  # Prometheus: coleta /metrics dos dois microsserviços.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ar-saude-prometheus
    restart: unless-stopped
    depends_on:
      - coletor
      - motor-alertas
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'

  # Grafana: dashboard provisionado (datasource Prometheus + painéis Ar-Saúde).
  grafana:
    image: grafana/grafana:11.2.0
    container_name: ar-saude-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3003}:3000'

  # Watchtower: Atualizador automático de containers via GHCR
  watchtower:
    image: containrrr/watchtower
    container_name: ar-saude-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 ar-saude-coletor ar-saude-motor-alertas ar-saude-frontend

volumes:
  postgres_data:
  grafana_data:
