services:
  postgres:
    image: postgres:16-alpine
    container_name: ar-saude-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-arsaude}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arsaude}
      POSTGRES_DB: ${DB_NAME:-arsaude_alertas}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arsaude} -d ${DB_NAME:-arsaude_alertas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  motor-alertas:
    build: .
    container_name: ar-saude-motor-alertas
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-arsaude}
      DB_PASSWORD: ${DB_PASSWORD:-arsaude}
      DB_NAME: ${DB_NAME:-arsaude_alertas}
      INTERSCITY_CATALOG_URL: ${INTERSCITY_CATALOG_URL:-https://interscity.rasppi.cloud/catalog}
      INTERSCITY_COLLECTOR_URL: ${INTERSCITY_COLLECTOR_URL:-https://interscity.rasppi.cloud/collector}
      MONITOR_INTERVAL: ${MONITOR_INTERVAL:-*/1 * * * *}
      ALERT_AQI_THRESHOLD: ${ALERT_AQI_THRESHOLD:-61}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002}
    ports:
      - "3001:3001"

volumes:
  postgres_data:
